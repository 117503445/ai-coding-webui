syntax = "proto3";

package pkg.rpc;

option go_package = "github.com/117503445/ai-coding-webui/pkg/rpc;rpc";

message ApiResponse {
  int64 code = 1;
  string message = 2;

  oneof payload {
    HealthzResponse healthz = 3;
  }
}

message HealthzRequest {}

message HealthzResponse {
  string version = 1;
  string request_id = 2;
}

service TemplateService {
  rpc Healthz(HealthzRequest) returns (ApiResponse);
}
