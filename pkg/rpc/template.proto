syntax = "proto3";

package pkg.rpc;

option go_package = "github.com/117503445/ai-coding-webui/pkg/rpc;rpc";

message ApiResponse {
  int64 code = 1;
  string message = 2;

  oneof payload {
    HealthzResponse healthz = 3;
    GetStatusResponse get_status = 4;
    AbortResponse abort = 5;
  }
}

message HealthzRequest {}

message HealthzResponse {
  string version = 1;
  string request_id = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  string status = 1;
  string detail = 2;
  string session_id = 3;
}

message AbortRequest {}

message AbortResponse {
  bool success = 1;
}

service ClaudeService {
  rpc Healthz(HealthzRequest) returns (ApiResponse);
  rpc GetStatus(GetStatusRequest) returns (ApiResponse);
  rpc Abort(AbortRequest) returns (ApiResponse);
}
